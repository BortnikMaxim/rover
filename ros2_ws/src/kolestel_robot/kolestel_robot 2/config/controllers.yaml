controller_manager:
  ros__parameters:
    update_rate: 50  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

diff_drive_controller:
  ros__parameters:
    # Wheel joints
    left_wheel_names: ["front_left_wheel_joint", "rear_left_wheel_joint"]
    right_wheel_names: ["front_right_wheel_joint", "rear_right_wheel_joint"]

    # Kinematics
    wheel_separation: 1.0
    wheel_radius: 0.2

    # Multipliers
    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    # TF frames
    odom_frame_id: odom
    base_frame_id: base_footprint

    # Pose covariance
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    # Velocity and acceleration limits
    linear.x.has_velocity_limits: true
    linear.x.has_acceleration_limits: true
    linear.x.has_jerk_limits: false
    linear.x.max_velocity: 2.0
    linear.x.min_velocity: -2.0
    linear.x.max_acceleration: 3.0
    linear.x.min_acceleration: -3.0

    angular.z.has_velocity_limits: true
    angular.z.has_acceleration_limits: true
    angular.z.has_jerk_limits: false
    angular.z.max_velocity: 1.5
    angular.z.min_velocity: -1.5
    angular.z.max_acceleration: 3.0
    angular.z.min_acceleration: -3.0

    # Publishing
    publish_rate: 50.0
    enable_odom_tf: true

    # Cmd_vel timeout
    cmd_vel_timeout: 0.5

    # Preserve turning radius when limiting speed/acceleration
    preserve_turning_radius: true

    # Use stamped velocity
    use_stamped_vel: false

    # Open loop control
    open_loop: false
