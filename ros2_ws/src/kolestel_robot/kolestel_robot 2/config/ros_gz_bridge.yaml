# ros_gz_bridge configuration for Kolestel 001 robot
# This file defines the topic mappings between Gazebo Sim and ROS 2

# Format: ros_topic_name@ros_msg_type[gz_msg_type (subscriber) or ]gz_msg_type (publisher)
# [ = Gazebo -> ROS (subscribe from Gazebo, publish to ROS)
# ] = ROS -> Gazebo (subscribe from ROS, publish to Gazebo)
# @ = bidirectional

# Note: This file is for reference. The actual bridge configuration
# is done via command-line arguments in the launch file for flexibility.

topics:
  # Clock synchronization (Gazebo -> ROS)
  - ros_topic_name: "/clock"
    gz_topic_name: "/clock"
    ros_type_name: "rosgraph_msgs/msg/Clock"
    gz_type_name: "gz.msgs.Clock"
    direction: GZ_TO_ROS

  # Velocity commands (ROS -> Gazebo)
  - ros_topic_name: "/cmd_vel"
    gz_topic_name: "/cmd_vel"
    ros_type_name: "geometry_msgs/msg/Twist"
    gz_type_name: "gz.msgs.Twist"
    direction: ROS_TO_GZ

  # Odometry (Gazebo -> ROS)
  - ros_topic_name: "/odom"
    gz_topic_name: "/odom"
    ros_type_name: "nav_msgs/msg/Odometry"
    gz_type_name: "gz.msgs.Odometry"
    direction: GZ_TO_ROS

  # TF transforms (Gazebo -> ROS)
  - ros_topic_name: "/tf"
    gz_topic_name: "/tf"
    ros_type_name: "tf2_msgs/msg/TFMessage"
    gz_type_name: "gz.msgs.Pose_V"
    direction: GZ_TO_ROS

  # Joint states (Gazebo -> ROS)
  - ros_topic_name: "/joint_states"
    gz_topic_name: "/joint_states"
    ros_type_name: "sensor_msgs/msg/JointState"
    gz_type_name: "gz.msgs.Model"
    direction: GZ_TO_ROS

  # LiDAR scan (Gazebo -> ROS)
  - ros_topic_name: "/scan"
    gz_topic_name: "/scan"
    ros_type_name: "sensor_msgs/msg/LaserScan"
    gz_type_name: "gz.msgs.LaserScan"
    direction: GZ_TO_ROS

  # IMU data (Gazebo -> ROS)
  - ros_topic_name: "/imu/data"
    gz_topic_name: "/imu/data"
    ros_type_name: "sensor_msgs/msg/Imu"
    gz_type_name: "gz.msgs.IMU"
    direction: GZ_TO_ROS

  # Front camera image (Gazebo -> ROS)
  - ros_topic_name: "/camera/front/image"
    gz_topic_name: "/camera/front/image"
    ros_type_name: "sensor_msgs/msg/Image"
    gz_type_name: "gz.msgs.Image"
    direction: GZ_TO_ROS

  # Rear camera image (Gazebo -> ROS)
  - ros_topic_name: "/camera/rear/image"
    gz_topic_name: "/camera/rear/image"
    ros_type_name: "sensor_msgs/msg/Image"
    gz_type_name: "gz.msgs.Image"
    direction: GZ_TO_ROS
