teleop_twist_joy_node:
  ros__parameters:
    # Axis configuration (for typical gamepad)
    axis_linear:
      x: 1  # Left stick vertical
    axis_angular:
      yaw: 0  # Left stick horizontal
    
    # Scale factors
    scale_linear:
      x: 1.5  # Max linear velocity (m/s)
    scale_angular:
      yaw: 1.0  # Max angular velocity (rad/s)
    
    # Turbo mode (hold button for higher speed)
    scale_linear_turbo:
      x: 2.0
    scale_angular_turbo:
      yaw: 1.5
    
    # Button configuration
    enable_button: 4  # L1 button - must hold to move
    enable_turbo_button: 5  # R1 button - turbo mode
    
    # Require deadman switch
    require_enable_button: true
    
    # Inverted axes (if needed)
    inverted_reverse: false
