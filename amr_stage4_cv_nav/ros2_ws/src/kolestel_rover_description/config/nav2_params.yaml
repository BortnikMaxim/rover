map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.25
      use_astar: true
      allow_unknown: true

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.10
      movement_time_allowance: 20.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.20

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false
      min_vel_x: 0.0
      max_vel_x: 0.35
      min_vel_y: 0.0
      max_vel_y: 0.0
      max_vel_theta: 0.80
      min_speed_xy: 0.05
      max_speed_xy: 0.35
      min_speed_theta: 0.20

      acc_lim_x: 0.60
      decel_lim_x: -0.60
      acc_lim_y: 0.0
      decel_lim_y: 0.0
      acc_lim_theta: 1.20
      decel_lim_theta: -1.20

      vx_samples: 12
      vy_samples: 1
      vtheta_samples: 20
      sim_time: 1.2
      linear_granularity: 0.05
      angular_granularity: 0.03
      transform_tolerance: 0.35
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: true
      stateful: true
      prune_plan: true

      critics:
        - RotateToGoal
        - Oscillation
        - BaseObstacle
        - GoalAlign
        - PathAlign
        - PathDist
        - GoalDist
        - PreferForward

      BaseObstacle.scale: 0.02
      PathAlign.scale: 16.0
      PathAlign.forward_point_distance: 0.30
      GoalAlign.scale: 10.0
      GoalAlign.forward_point_distance: 0.20
      PathDist.scale: 24.0
      GoalDist.scale: 18.0
      RotateToGoal.scale: 10.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0
      PreferForward.scale: 8.0
      Oscillation.scale: 1.0

behavior_server:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    local_costmap_topic: /local_costmap/costmap_raw
    global_costmap_topic: /global_costmap/costmap_raw
    local_footprint_topic: /local_costmap/published_footprint
    global_footprint_topic: /global_costmap/published_footprint
    cycle_frequency: 10.0
    transform_tolerance: 0.35
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    navigators: ["navigate_to_pose"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 6.0
      publish_frequency: 3.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 6.0
      height: 6.0
      resolution: 0.05
      footprint: "[[0.50, 0.33], [0.50, -0.33], [-0.50, -0.33], [-0.50, 0.33]]"
      footprint_padding: 0.03
      transform_tolerance: 0.35
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        footprint_clearing_enabled: true
        combination_method: 1
        observation_sources: "lidar"
        lidar:
          topic: /lidar
          data_type: PointCloud2
          expected_update_rate: 0.0
          observation_persistence: 0.0
          marking: true
          clearing: true
          min_obstacle_height: 0.25
          max_obstacle_height: 1.80
          obstacle_min_range: 0.0
          obstacle_max_range: 8.0
          raytrace_min_range: 0.0
          raytrace_max_range: 10.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.5
        inflation_radius: 0.40
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      resolution: 0.05
      track_unknown_space: true
      footprint: "[[0.50, 0.33], [0.50, -0.33], [-0.50, -0.33], [-0.50, 0.33]]"
      footprint_padding: 0.03
      transform_tolerance: 0.35
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.5
        inflation_radius: 0.40
      always_send_full_costmap: true

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    bond_timeout: 0.0
    node_names:
      - map_server
      - planner_server
      - controller_server
      - behavior_server
      - bt_navigator
